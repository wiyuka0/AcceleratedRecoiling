name: Build 1.21.11

on:
  push:
    branches: [ "1.21.11*" ]
    tags: [ "v*" ]

permissions:
  contents: write

jobs:
  build-and-package:
    name: Build Native Libs & Package Mod
    # 必须在 Windows 上运行，因为 Gradle 脚本依赖 cmd、.bat 并且写了 onlyIf { isWindows }
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 使用官方 Gradle Action，自动处理环境和依赖缓存
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 这一条命令会触发你的整个构建链：
      # 下载解压工具链 -> 跑 win/linux/mac 的 bat 脚本 -> 编译 Java -> 移除预览版 ASM -> 生成最终 Jars
      - name: Build project
        run: .\gradlew.bat build --stacktrace

      - name: Upload Mod artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AcceleratedRecoiling-${{ github.ref_name }}-build-${{ github.run_number }}
          path: |
            fabric/build/libs/*-fabric.jar
            neoforge/build/libs/*-neoforge.jar
          if-no-files-found: warn

      - name: Publish to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            fabric/build/libs/*-fabric.jar
            neoforge/build/libs/*-neoforge.jar
          generate_release_notes: true