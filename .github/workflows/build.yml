name: Build 1.21.11

on:
  push:
    branches: [ "1.21.11"]

jobs:
  build-windows-native:
    name: Build Windows Native Libs
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Compile Windows native library
        run: ./gradlew compileNativeLib

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-native-libs
          path: "**/build-native/*.dll"
          retention-days: 1

  build-and-package:
    name: Build Linux Native Libs & Package Mod
    needs: build-windows-native
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install C++ toolchain
        run: sudo apt-get update && sudo apt-get install -y g++ build-essential

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-native-libs
          path: .

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build project
        run: ./gradlew build --stacktrace

      - name: Upload Mod artifacts
        uses: actions/upload-artifact@v4
        with:
          # 生成标准的压缩包名称，例如: AcceleratedRecoiling-1.21.x-build-42
          name: AcceleratedRecoiling-${{ github.ref_name }}-build-${{ github.run_number }}
          path: |
            fabric/build/libs/*-fabric.jar
            neoforge/build/libs/*-neoforge.jar