name: 自动构建

on:
  push:
    branches: [ "**" ]

jobs:
  build-windows-dll:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 配置 Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 配置 MSVC 环境
        uses: ilammy/msvc-dev-cmd@v1

      - name: 编译 .dll
        run: ./gradlew compileNativeLib

      - name: 暂存 .dll 文件给下一步使用
        uses: actions/upload-artifact@v4
        with:
          name: windows-dll
          path: build/acceleratedRecoilingLib.dll

  build-linux-and-jar:
    needs: build-windows-dll
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 配置 Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 配置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v3

      - name: Gradle 执行权限
        run: chmod +x ./gradlew

      - name: 安装 Linux C++ 编译环境
        run: sudo apt-get update && sudo apt-get install -y g++ build-essential

      - name: 下载 Windows .dll
        uses: actions/download-artifact@v4
        with:
          name: windows-dll
          path: build/

      - name: 编译 .so 并执行打包
        run: ./gradlew build --stacktrace

      - name: 提取 Mod Jar 包
        uses: actions/upload-artifact@v4
        with:
          name: 构建完成-${{ github.ref_name }}
          path: build/libs/*.jar