name: 自动构建与发布

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]

permissions:
  contents: write

jobs:
  build-and-release:
    name: 编译打包与发布
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 配置 Gradle 环境与缓存
        uses: gradle/actions/setup-gradle@v4

      - name: 全自动编译与打包 (C++ 跨平台 + Java 编译)
        run: .\gradlew.bat build --stacktrace

      - name: 提取 Mod Jar 包 (上传到 Actions 页面)
        uses: actions/upload-artifact@v4
        with:
          name: 构建完成-${{ github.ref_name }}
          path: build/libs/*.jar
          if-no-files-found: warn

      - name: 创建 GitHub Release 并上传文件
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          generate_release_notes: true

      - name: 发布到 CurseForge 和 Modrinth
        if: startsWith(github.ref, 'refs/tags/v')
        uses: kir-antipov/mc-publish@v3.3
        with:

          files: build/libs/!(*-dev|-sources|-javadoc).jar

          name: ${{ github.ref_name }}
          version: ${{ github.ref_name }}

          loaders: forge
          game-versions: 1.20.1


          curseforge-id: ${{ secrets.CF_PROJECT_ID }}
          curseforge-token: ${{ secrets.CF_TOKEN }}

          modrinth-id: ${{ secrets.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}